models:
  - name: loyalty_campaign_targets
    description: >
      High-value customer segments for targeted loyalty campaigns.
      Consumes dim_customers and fct_sales_orders from the core platform project
      via dbt Mesh cross-project references.
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: campaign_segment
        tests:
          - accepted_values:
              arguments:
                values: ['vip_retention', 'upgrade_candidate', 'win_back', 'standard_nurture']

  - name: regional_performance
    description: >
      Monthly regional sales performance for geo-targeted campaigns.
      Consumes core platform models via dbt Mesh.

  - name: regional_target_attainment
    description: >
      Compares actual regional sales performance against monthly targets.
      Identifies underperforming regions for campaign intervention.
    columns:
      - name: region
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: performance_status
        tests:
          - accepted_values:
              arguments:
                values: ['on_track', 'at_risk', 'behind', 'no_target']
