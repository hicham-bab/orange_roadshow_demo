models:
  - name: int_current_customers
    description: >
      Filters the SCD2 customers table to CURRENT active records only
      (is_current = true). One row per customer_id. Joins loyalty segment
      descriptions so the loyalty tier name is available for marts.
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_name
        tests: [not_null]
      - name: loyalty_segment_description
        tests: [not_null]

  - name: int_sales_order_lines
    description: >
      Explodes ORDERED_PRODUCTS JSON from stg_sales_orders into one row per
      order line item. Extracts product_id, product_name, quantity, and unit_price
      from the JSON array. Used by fct_sales_orders to compute order-level revenue.
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: unit_price
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: line_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: int_b2b_customer_health
    description: >
      Aggregates B2B customer metrics from orders and support tickets.
      Produces a health score and risk flag for each B2B account.
    columns:
      - name: b2b_customer_id
        tests: [unique, not_null]
      - name: health_score
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
      - name: account_health_status
        tests:
          - accepted_values:
              arguments:
                values: ['healthy', 'needs_attention', 'at_risk']
