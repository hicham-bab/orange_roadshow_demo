metrics:
  - name: total_revenue
    description: >
      Total revenue from B2B retail orders. Sums the order_amount field which is populated
      for B2B orders. Use order_type = 'b2b' as a filter when comparing to B2C volume metrics.
    type: simple
    type_params:
      measure:
        name: total_revenue

  - name: order_count
    description: >
      Total number of orders across all channels (B2B + B2C). Use the order_type dimension
      to break down by channel.
    type: simple
    type_params:
      measure:
        name: order_count

  - name: customer_count
    description: >
      Count of distinct B2C customers. Use with the loyalty_segment or region dimension
      to analyze customer distribution.
    type: simple
    type_params:
      measure:
        name: customer_count

  - name: avg_order_value
    description: >
      Average monetary value per order for B2B retail orders. Null order amounts (B2C)
      are excluded from the average calculation automatically.
    type: simple
    type_params:
      measure:
        name: avg_order_value

  - name: ticket_count
    description: >
      Total number of support tickets raised by B2B customers. Slice by issue_type,
      status, or region for support workload analysis.
    type: simple
    type_params:
      measure:
        name: ticket_count

  - name: open_ticket_rate
    description: >
      Proportion of support tickets that are currently open or in progress, expressed as
      a ratio. A rising open_ticket_rate may indicate support capacity constraints or
      increasing customer issues. Calculated as open_ticket_count / ticket_count.
    type: ratio
    type_params:
      numerator:
        name: open_ticket_count
      denominator:
        name: ticket_count

  - name: cancellation_rate
    description: >
      Proportion of orders that have been cancelled, expressed as a ratio of cancelled
      orders to total orders. Useful for identifying regional or seasonal cancellation trends.
      Calculated as cancelled_order_count / order_count.
    type: ratio
    type_params:
      numerator:
        name: cancelled_order_count
      denominator:
        name: order_count

  - name: revenue_per_customer
    description: >
      Derived metric expressing average B2B revenue generated per B2C customer.
      Useful as a high-level cross-sell and efficiency KPI during demos.
      Calculated as total_revenue divided by customer_count.
    type: derived
    type_params:
      expr: "total_revenue / customer_count"
      metrics:
        - name: total_revenue
        - name: customer_count
