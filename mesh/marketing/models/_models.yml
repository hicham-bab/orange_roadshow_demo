models:
  - name: mkt_loyalty_cohorts
    description: >
      Aggregated loyalty cohort analysis derived from the platform dim_customers and
      dim_loyalty_segments models. Each row represents a loyalty tier with customer
      counts, average purchase volume, and the percentage of active customers in that
      segment. Used by marketing to understand tier distribution and engagement.
    columns:
      - name: loyalty_segment
        description: Loyalty tier name (e.g., Gold, Silver, Bronze).
        tests:
          - not_null
          - unique
      - name: loyalty_segment_description
        description: Full descriptive label of the loyalty tier.
        tests:
          - not_null
      - name: unit_threshold
        description: Minimum cumulative units purchased to qualify for this tier.
        tests:
          - not_null
      - name: customer_count
        description: Count of distinct customers in this loyalty segment.
        tests:
          - not_null
      - name: avg_units_purchased
        description: Average number of units purchased across customers in this segment.
      - name: pct_active
        description: >
          Percentage of customers in this segment with an active record (is_active = true),
          expressed as a value from 0 to 100.

  - name: mkt_promo_performance
    description: >
      B2C promo vs. non-promo comparison derived from fct_orders. Shows how promotional
      codes affect basket size (number of line items) and what share of total B2C orders
      each group represents. Filtered to order_type = 'b2c'.
    columns:
      - name: has_promo
        description: Boolean flag; true for orders where a promotional code was applied.
        tests:
          - not_null
          - unique
      - name: order_count
        description: Total number of B2C orders in this promo group.
        tests:
          - not_null
      - name: avg_line_items
        description: Average number of product line items per order in this group.
      - name: pct_of_total_orders
        description: >
          Share of this group as a percentage of all B2C orders (0–100).

  - name: mkt_regional_performance
    description: >
      Regional performance summary combining B2B and B2C order volumes and revenue.
      Derived from fct_orders and dim_customers. Each row represents a geographic
      region with breakdowns for both channels, helping marketing assess regional
      opportunity and customer density.
    columns:
      - name: region
        description: Geographic sales region (e.g., WEST, EAST, CENTRAL).
        tests:
          - not_null
          - unique
      - name: total_b2c_orders
        description: Count of B2C orders originating from this region.
        tests:
          - not_null
      - name: total_b2b_orders
        description: Count of B2B orders originating from this region.
        tests:
          - not_null
      - name: total_b2b_revenue
        description: Sum of order_amount for all B2B orders in this region.
      - name: avg_b2b_order_value
        description: Average order_amount for B2B orders in this region.
      - name: customer_count
        description: Count of distinct customer_ids associated with orders in this region.
        tests:
          - not_null
